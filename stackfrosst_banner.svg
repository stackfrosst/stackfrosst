<svg width="900" height="300" viewBox="0 0 900 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#020810"/>
    </radialGradient>
    <radialGradient id="glow1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4fc3f7" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#4fc3f7" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#81d4fa" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#81d4fa" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur1">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
    <filter id="blur2">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <filter id="blur3">
      <feGaussianBlur stdDeviation="1.5"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="300" fill="url(#bg)"/>

  <!-- Ambient glow blobs -->
  <ellipse cx="200" cy="150" rx="200" ry="120" fill="url(#glow1)" filter="url(#blur1)"/>
  <ellipse cx="700" cy="150" rx="180" ry="100" fill="url(#glow2)" filter="url(#blur1)"/>
  <ellipse cx="450" cy="80" rx="150" ry="80" fill="url(#glow1)" filter="url(#blur1)"/>

  <!-- Grid lines - horizontal -->
  <g stroke="#4fc3f7" stroke-opacity="0.06" stroke-width="0.5">
    <line x1="0" y1="50" x2="900" y2="50"/>
    <line x1="0" y1="100" x2="900" y2="100"/>
    <line x1="0" y1="150" x2="900" y2="150"/>
    <line x1="0" y1="200" x2="900" y2="200"/>
    <line x1="0" y1="250" x2="900" y2="250"/>
  </g>
  <!-- Grid lines - vertical -->
  <g stroke="#4fc3f7" stroke-opacity="0.06" stroke-width="0.5">
    <line x1="100" y1="0" x2="100" y2="300"/>
    <line x1="200" y1="0" x2="200" y2="300"/>
    <line x1="300" y1="0" x2="300" y2="300"/>
    <line x1="400" y1="0" x2="400" y2="300"/>
    <line x1="500" y1="0" x2="500" y2="300"/>
    <line x1="600" y1="0" x2="600" y2="300"/>
    <line x1="700" y1="0" x2="700" y2="300"/>
    <line x1="800" y1="0" x2="800" y2="300"/>
  </g>

  <!-- Snowflakes - large -->
  <g fill="#4fc3f7" fill-opacity="0.5">
    <!-- Snowflake 1 -->
    <g transform="translate(80, 60)">
      <line x1="-8" y1="0" x2="8" y2="0" stroke="#4fc3f7" stroke-width="1.5" stroke-opacity="0.5"/>
      <line x1="0" y1="-8" x2="0" y2="8" stroke="#4fc3f7" stroke-width="1.5" stroke-opacity="0.5"/>
      <line x1="-6" y1="-6" x2="6" y2="6" stroke="#4fc3f7" stroke-width="1.5" stroke-opacity="0.5"/>
      <line x1="6" y1="-6" x2="-6" y2="6" stroke="#4fc3f7" stroke-width="1.5" stroke-opacity="0.5"/>
      <animateTransform attributeName="transform" type="rotate" values="0 80 60;360 80 60" dur="12s" repeatCount="indefinite"/>
    </g>
    <!-- Snowflake 2 -->
    <g transform="translate(820, 40)">
      <line x1="-6" y1="0" x2="6" y2="0" stroke="#81d4fa" stroke-width="1.2" stroke-opacity="0.4"/>
      <line x1="0" y1="-6" x2="0" y2="6" stroke="#81d4fa" stroke-width="1.2" stroke-opacity="0.4"/>
      <line x1="-4" y1="-4" x2="4" y2="4" stroke="#81d4fa" stroke-width="1.2" stroke-opacity="0.4"/>
      <line x1="4" y1="-4" x2="-4" y2="4" stroke="#81d4fa" stroke-width="1.2" stroke-opacity="0.4"/>
      <animateTransform attributeName="transform" type="rotate" values="360 820 40;0 820 40" dur="9s" repeatCount="indefinite"/>
    </g>
    <!-- Snowflake 3 -->
    <g transform="translate(150, 240)">
      <line x1="-5" y1="0" x2="5" y2="0" stroke="#b3e5fc" stroke-width="1" stroke-opacity="0.3"/>
      <line x1="0" y1="-5" x2="0" y2="5" stroke="#b3e5fc" stroke-width="1" stroke-opacity="0.3"/>
      <line x1="-3.5" y1="-3.5" x2="3.5" y2="3.5" stroke="#b3e5fc" stroke-width="1" stroke-opacity="0.3"/>
      <line x1="3.5" y1="-3.5" x2="-3.5" y2="3.5" stroke="#b3e5fc" stroke-width="1" stroke-opacity="0.3"/>
      <animateTransform attributeName="transform" type="rotate" values="0 150 240;360 150 240" dur="15s" repeatCount="indefinite"/>
    </g>
    <!-- Snowflake 4 -->
    <g transform="translate(760, 230)">
      <line x1="-7" y1="0" x2="7" y2="0" stroke="#4fc3f7" stroke-width="1.3" stroke-opacity="0.45"/>
      <line x1="0" y1="-7" x2="0" y2="7" stroke="#4fc3f7" stroke-width="1.3" stroke-opacity="0.45"/>
      <line x1="-5" y1="-5" x2="5" y2="5" stroke="#4fc3f7" stroke-width="1.3" stroke-opacity="0.45"/>
      <line x1="5" y1="-5" x2="-5" y2="5" stroke="#4fc3f7" stroke-width="1.3" stroke-opacity="0.45"/>
      <animateTransform attributeName="transform" type="rotate" values="180 760 230;540 760 230" dur="10s" repeatCount="indefinite"/>
    </g>
    <!-- Snowflake 5 small -->
    <g transform="translate(350, 30)">
      <line x1="-4" y1="0" x2="4" y2="0" stroke="#e1f5fe" stroke-width="0.8" stroke-opacity="0.25"/>
      <line x1="0" y1="-4" x2="0" y2="4" stroke="#e1f5fe" stroke-width="0.8" stroke-opacity="0.25"/>
      <animateTransform attributeName="transform" type="rotate" values="0 350 30;360 350 30" dur="20s" repeatCount="indefinite"/>
    </g>
    <!-- Snowflake 6 small -->
    <g transform="translate(560, 270)">
      <line x1="-4" y1="0" x2="4" y2="0" stroke="#e1f5fe" stroke-width="0.8" stroke-opacity="0.2"/>
      <line x1="0" y1="-4" x2="0" y2="4" stroke="#e1f5fe" stroke-width="0.8" stroke-opacity="0.2"/>
      <line x1="-3" y1="-3" x2="3" y2="3" stroke="#e1f5fe" stroke-width="0.8" stroke-opacity="0.2"/>
      <line x1="3" y1="-3" x2="-3" y2="3" stroke="#e1f5fe" stroke-width="0.8" stroke-opacity="0.2"/>
      <animateTransform attributeName="transform" type="rotate" values="45 560 270;405 560 270" dur="18s" repeatCount="indefinite"/>
    </g>
  </g>

  <!-- Floating particles -->
  <g fill="#4fc3f7">
    <circle cx="60" cy="120" r="1.5" fill-opacity="0.4">
      <animate attributeName="cy" values="120;100;120" dur="6s" repeatCount="indefinite"/>
      <animate attributeName="fill-opacity" values="0.4;0.8;0.4" dur="6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="840" cy="180" r="1" fill-opacity="0.3">
      <animate attributeName="cy" values="180;160;180" dur="8s" repeatCount="indefinite"/>
      <animate attributeName="fill-opacity" values="0.3;0.6;0.3" dur="8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="430" cy="20" r="1.5" fill-opacity="0.35">
      <animate attributeName="cy" values="20;35;20" dur="5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="200" cy="270" r="1" fill-opacity="0.25">
      <animate attributeName="cy" values="270;255;270" dur="7s" repeatCount="indefinite"/>
    </circle>
    <circle cx="680" cy="50" r="1.2" fill-opacity="0.3">
      <animate attributeName="cy" values="50;65;50" dur="9s" repeatCount="indefinite"/>
    </circle>
    <circle cx="900" cy="130" r="2" fill-opacity="0.2">
      <animate attributeName="cx" values="900;880;900" dur="11s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Ice crystal decorations left -->
  <g transform="translate(50, 150)" stroke="#4fc3f7" stroke-opacity="0.2" fill="none">
    <polygon points="0,-20 17,10 -17,10" stroke-width="0.8"/>
    <polygon points="0,20 17,-10 -17,-10" stroke-width="0.8"/>
    <circle cx="0" cy="0" r="12" stroke-width="0.5"/>
  </g>

  <!-- Ice crystal decorations right -->
  <g transform="translate(855, 150)" stroke="#4fc3f7" stroke-opacity="0.15" fill="none">
    <polygon points="0,-15 13,7.5 -13,7.5" stroke-width="0.8"/>
    <polygon points="0,15 13,-7.5 -13,-7.5" stroke-width="0.8"/>
    <circle cx="0" cy="0" r="9" stroke-width="0.5"/>
  </g>

  <!-- Horizontal accent lines -->
  <line x1="0" y1="1" x2="900" y2="1" stroke="#4fc3f7" stroke-opacity="0.3" stroke-width="1"/>
  <line x1="0" y1="299" x2="900" y2="299" stroke="#4fc3f7" stroke-opacity="0.3" stroke-width="1"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="900" height="3" fill="#4fc3f7" fill-opacity="0.15"/>
  <rect x="0" y="297" width="900" height="3" fill="#4fc3f7" fill-opacity="0.15"/>

  <!-- Vertical side accents -->
  <rect x="0" y="0" width="2" height="300" fill="#4fc3f7" fill-opacity="0.2"/>
  <rect x="898" y="0" width="2" height="300" fill="#4fc3f7" fill-opacity="0.2"/>

  <!-- Corner brackets -->
  <g stroke="#4fc3f7" stroke-opacity="0.5" stroke-width="1.5" fill="none">
    <polyline points="0,20 0,0 20,0"/>
    <polyline points="880,0 900,0 900,20"/>
    <polyline points="900,280 900,300 880,300"/>
    <polyline points="20,300 0,300 0,280"/>
  </g>

  <!-- Main title glow layer -->
  <text x="450" y="142" text-anchor="middle" font-family="'Courier New', monospace" font-size="52" font-weight="700" fill="#4fc3f7" fill-opacity="0.15" filter="url(#blur2)">STACKFROSST</text>

  <!-- Main title -->
  <text x="450" y="142" text-anchor="middle" font-family="'Courier New', monospace" font-size="52" font-weight="700" letter-spacing="6">
    <tspan fill="#e1f5fe">STACK</tspan><tspan fill="#4fc3f7">FROSST</tspan>
  </text>

  <!-- Subtitle -->
  <text x="450" y="175" text-anchor="middle" font-family="'Courier New', monospace" font-size="13" fill="#81d4fa" fill-opacity="0.8" letter-spacing="4">FULL-STACK DEVELOPER · REMOTE EU/USA</text>

  <!-- Bottom tag line with blink cursor -->
  <text x="450" y="215" text-anchor="middle" font-family="'Courier New', monospace" font-size="11" fill="#4fc3f7" fill-opacity="0.5" letter-spacing="2">[ React · Node.js · React Native · TypeScript ]</text>

  <!-- Animated scan line -->
  <rect x="0" y="0" width="900" height="2" fill="#4fc3f7" fill-opacity="0.06">
    <animate attributeName="y" values="-2;302;-2" dur="4s" repeatCount="indefinite"/>
  </rect>

  <!-- Pulsing center glow -->
  <ellipse cx="450" cy="150" rx="180" ry="60" fill="#4fc3f7" fill-opacity="0">
    <animate attributeName="fill-opacity" values="0;0.04;0" dur="3s" repeatCount="indefinite"/>
  </ellipse>

  <!-- Station ID bottom right -->
  <text x="878" y="290" text-anchor="end" font-family="'Courier New', monospace" font-size="9" fill="#4fc3f7" fill-opacity="0.3" letter-spacing="1">STATION-ID: SFR-001</text>

  <!-- Temperature indicator bottom left -->
  <text x="22" y="290" font-family="'Courier New', monospace" font-size="9" fill="#4fc3f7" fill-opacity="0.3" letter-spacing="1">TEMP: -40°C</text>

</svg>
